<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App | DavasStudio</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Global styles -->
    <link rel="stylesheet" href="../css/global.css" />
    <!-- App styles -->
    <link rel="stylesheet" href="./weather.css" />
  </head>

  <body>
    <header class="weather-header">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between py-4">
          <a href="../vasile.html" class="brand"> </a>
          <a href="../vasile.html" class="btn btn-outline-light btn-sm">
            Back to Profile
          </a>
        </div>
      </div>
    </header>

    <main class="weather-main py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-xl-6 col-lg-7 col-md-9">
            <div class="weather-card p-4 shadow-sm">
              <h1 class="weather-title text-center mb-3">Weather Checker</h1>
              <p class="text-center text-muted mb-4">
                Enter a city and country to get real-time weather data powered
                by OpenWeatherMap.
              </p>

              <form id="weather-form" class="row g-3">
                <div class="col-md-6">
                  <label class="form-label" for="city">City</label>
                  <input
                    id="city"
                    name="city"
                    class="form-control"
                    type="text"
                    placeholder="e.g. Bucharest"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="country">Country</label>
                  <input
                    id="country"
                    name="country"
                    class="form-control"
                    type="text"
                    placeholder="e.g. RO"
                    required
                  />
                </div>

                <div class="col-12 text-center">
                  <button
                    id="check-btn"
                    type="submit"
                    class="btn btn-primary btn-lg px-5"
                  >
                    Check Weather
                  </button>
                </div>
              </form>

              <div id="result" class="weather-result mt-4 d-none">
                <div
                  class="d-flex align-items-center justify-content-between mb-3"
                >
                  <div>
                    <h2 id="result-city" class="mb-1"></h2>
                    <p id="result-status" class="mb-0 text-muted"></p>
                  </div>
                  <div id="result-icon" class="weather-icon"></div>
                </div>

                <div class="row g-3">
                  <div class="col-6">
                    <div class="weather-stat">
                      <span class="weather-label">Temperature</span>
                      <span id="result-temp" class="weather-value"></span>
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="weather-stat">
                      <span class="weather-label">Humidity</span>
                      <span id="result-humidity" class="weather-value"></span>
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="weather-stat">
                      <span class="weather-label">Wind</span>
                      <span id="result-wind" class="weather-value"></span>
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="weather-stat">
                      <span class="weather-label">Feels Like</span>
                      <span id="result-feels" class="weather-value"></span>
                    </div>
                  </div>
                </div>

                <div
                  id="result-error"
                  class="alert alert-danger mt-4 d-none"
                  role="alert"
                ></div>
              </div>

              <div id="loading" class="text-center mt-4 d-none">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2 mb-0">Fetching weather...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center py-4 text-muted">
      <div class="container">
        <small>
          Weather data from
          <a href="https://openweathermap.org/" target="_blank" rel="noreferrer"
            >OpenWeatherMap</a
          >.
        </small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./weather.js"></script>
  </body>
</html>
